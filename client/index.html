<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.6/dist/axios.min.js" defer></script>
    <script src="script.js" defer></script>
    <style>
        @import url(https://fonts.googleapis.com/css?family=Inter:100,200,300,regular,500,600,700,800,900,100italic,200italic,300italic,italic,500italic,600italic,700italic,800italic,900italic);

        body {
            font-family: 'Inter', sans-serif;
        }

        .font-weight-bold {
            font-weight: 700 !important;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <label class="form-label font-weight-bold" for="fio">Ваше ФИО</label>
        <input type="text" class="form-control" placeholder="Иванов Иван Иванович" id="fio">
        <div class="mt-3"></div>
        <label class="form-label font-weight-bold" for="phoneNumber">Ваш номер телефона</label>
        <input type="text" class="form-control" placeholder="+7123456..." id="phoneNumber" value="+7">
        <div class="mt-3"></div>
        <label class="form-label font-weight-bold" for="email">Ваш адрес электронной почты</label>
        <input type="text" class="form-control" placeholder="example@mail.org" id="email">
        <div class="mt-3"></div>
        <label class="form-label font-weight-bold" for="birthDate">Ваша дата рождения</label>
        <input type="date" class="form-control" id="birthDate">
        <div class="mt-3"></div>
        <label class="form-label font-weight-bold">Ваш пол</label>
        <div class="row">
            <div class="col-6">
                <input type="radio" id="sexMale" class="form-check-input me-3" name="sex">
                <label for="sexMale" class="form-label">Мужской</label>
            </div>
            <div class="col-6">
                <input type="radio" id="sexFemale" class="form-check-input me-3" name="sex">
                <label for="sexFemale" class="form-label">Женский</label>
            </div>
        </div>
       <div class="mt-3"></div>
        <label class="form-label font-weight-bold" for="favouriteLangs">Какими языками программирования Вы владеете?</label>
        <select size="12" name="favouriteLangs[]" class="form-select" id="favouriteLangs" multiple>
            <option value="Pascal">Pascal</option>
            <option value="C">C</option>
            <option value="C++">C++</option>
            <option value="JavaScript">JavaScript</option>
            <option value="PHP">PHP</option>
            <option value="Python">Python</option>
            <option value="Java">Java</option>
            <option value="Haskel">Haskel</option>
            <option value="Clojure">Clojure</option>
            <option value="Prolog">Prolog</option>
            <option value="Scala">Scala</option>
            <option value="GoLang">GoLang</option>
        </select>
        <div class="mt-3"></div>
        <label class="form-label font-weight-bold" for="biography">Опишите Вашу биографию</label>
        <textarea type="text" class="form-control" id="biography" rows="7"></textarea>
        <div class="mt-3"></div>
        <input type="checkbox" id="successContract" class="form-check-input me-3" name="successContract">
        <label for="successContract">С контрактом ознакомлен(-а)</label>
        <div class="mt-3"></div>
        <div class="alert alert-danger d-none" id="alert"></div>
        <div class="mt-5"></div>
        <button class="btn btn-success mb-5 w-100 font-weight-bold" id="sendBtn">Отправить</button>
    </div>

    <div class="mt-5">
        <p>Пример создания таблицы MySQL</p>
        <p><img src="1.PNG" width="auto"></p>
        <p>Пример добавления записей в таблицу MySQL</p>
        <p><img src="2.PNG"></p>
        <p>Структура таблиц заявок, языков и таблицы связи заявка-способность MySQL</p>
        <p><img src="3.PNG" alt=""></p>
        <p>Пример отправленной формы в таблицу application</p>
        <p><img src="4.PNG" alt=""></p>
        <p>Фрагмента кода подключения к базе данных MySQL на стороне сервера</p>
        <p><img src="5.PNG" alt=""></p>
    </div>
</body>
</html>
